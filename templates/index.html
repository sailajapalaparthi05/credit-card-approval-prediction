<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>💳 Credit Card Approval Prediction System</h2>

<form action="/predict" method="POST">

<label>Gender</label>
<select name="gender">
<option value="M">Male</option>
<option value="F">Female</option>
</select>

<label>Own Car</label>
<select name="car">
<option value="Y">Yes</option>
<option value="N">No</option>
</select>

<label>Own House</label>
<select name="realty">
<option value="Y">Yes</option>
<option value="N">No</option>
</select>

<label>Children</label>
<input type="number" name="children" required>

<label>Annual Income</label>
<input type="number" name="income" required>

<label>Income Type</label>
<select name="income_type">
<option>Working</option>
<option>Commercial associate</option>
<option>Pensioner</option>
<option>State servant</option>
<option>Student</option>
</select>

<label>Education</label>
<select name="education">
<option>Secondary / secondary special</option>
<option>Higher education</option>
<option>Incomplete higher</option>
<option>Lower secondary</option>
<option>Academic degree</option>
</select>

<label>Family Status</label>
<select name="family_status">
<option>Married</option>
<option>Single / not married</option>
<option>Civil marriage</option>
<option>Separated</option>
<option>Widow</option>
</select>

<label>Housing Type</label>
<select name="housing">
<option>House / apartment</option>
<option>With parents</option>
<option>Municipal apartment</option>
<option>Rented apartment</option>
<option>Office apartment</option>
<option>Co-op apartment</option>
</select>

<label>Days Birth</label>
<input type="number" name="days_birth" required>

<label>Days Employed</label>
<input type="number" name="days_employed" required>

<label>Work Phone (0/1)</label>
<input type="number" name="work_phone" min="0" max="1" required>

<label>Phone (0/1)</label>
<input type="number" name="phone" min="0" max="1" required>

<label>Email (0/1)</label>
<input type="number" name="email" min="0" max="1" required>

<label>Occupation</label>
<input type="text" name="occupation" required>

<label>Family Members</label>
<input type="number" step="0.1" name="family_members" required>

<br><br>

<button type="submit">🔍 check eligibility</button>

</form>

{% if prediction %}
<h3>{{ prediction }}</h3>
{% endif %}

</div>

</body>
</html>
